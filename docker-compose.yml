version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: clerkey-db-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clerkey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db:/docker-entrypoint-initdb.d # Script to enable pgvector extension automatically
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clerkey"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
